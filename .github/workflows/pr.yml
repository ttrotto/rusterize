name: PR

on:
  pull_request:

permissions:
  contents: read

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: cargo test
        run: cargo test -p rusterize-rs

  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install GDAL system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev

      - name: Build extension + install test deps
        run: |
          pip install maturin
          maturin build --out dist
          pip install numpy setuptools wheel
          pip install --no-build-isolation gdal==$(gdal-config --version)
          pip install "$(ls dist/*.whl)[all]" pytest

      - name: pytest
        run: pytest test/

  r-savvy-bindings:
    # gate against stale savvy bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2

      - name: Install savvy
        run: Rscript -e 'install.packages("savvy", repos = "https://yutannihilation.r-universe.dev")'

      - name: Regenerate bindings
        run: Rscript -e 'savvy::savvy_update("R/rusterize")'

      - name: Fail if savvy bindings are stale
        run: |
          if ! git diff --exit-code -- \
               R/rusterize/src/rust/api.h \
               R/rusterize/src/init.c \
               R/rusterize/R/000-wrappers.R; then
            echo "::error::savvy bindings out of date. Run R/rusterize/tools/savvy-update.sh and commit the result."
            exit 1
          fi

  r-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: R/rusterize

      - name: Install savvy
        run: Rscript -e 'install.packages("savvy", repos = "https://yutannihilation.r-universe.dev")'

      - name: Regenerate bindings
        run: Rscript -e 'savvy::savvy_update("R/rusterize"); devtools::document("R/rusterize")'

      - name: testthat
        run: Rscript -e 'testthat::test_local("R/rusterize")'
